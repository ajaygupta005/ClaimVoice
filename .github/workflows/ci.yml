name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v3

      - name: Install Python deps
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check . --exit-zero
        continue-on-error: true

      - name: Unit tests
        run: uv run pytest -q -m "not integration" --continue-on-collection-errors
        continue-on-error: true

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json "packageManager"; do not also set
      # `version` here or action-setup@v4 errors with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node deps
        run: pnpm install --no-frozen-lockfile

      - name: Build (if any package has it)
        run: pnpm -r --if-present build
        continue-on-error: true
