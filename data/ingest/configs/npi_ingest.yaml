npi:
  # Local-CSV bypass for dev: point at a CSV with NPPES V2 headers (e.g. the
  # synthetic sample from scripts/generate_nppes_sample.py) to skip the ~1 GB
  # CMS download. Empty = download the real monthly dump from download_url.
  # Override on the CLI: python data/ingest/npi_ingest.py npi.source_csv=data/raw/nppes_sample.csv
  source_csv: ""
  download_url: "https://download.cms.gov/nppes/npi_data.zip"
  extract_dir: "data/raw/nppes_v2_may2026"
  
  # Filtering: NY metro + surrounding areas
  geo_filter:
    states: ["NY", "NJ", "CT"]
    min_latitude: 40.4
    max_latitude: 41.5
    min_longitude: -74.5
    max_longitude: -73.2
  
  # Include only active NPIs
  include_deactivated: false
  
  # Filter by entity type: 1=Individual, 2=Organization
  entity_types: [1, 2]
  
  # Filter by primary taxonomy (optional; empty = all)
  taxonomy_filter:
    exclude_specialties: []  # If non-empty, exclude these
  
  database:
    connection_string: "${oc.env:DATABASE_URL,postgresql://localhost/claimvoice}"
    batch_size: 5000
    
logging:
  level: "INFO"
  file: "data/ingest.log"
  
prometheus:
  port: 8000
